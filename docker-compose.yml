version: '3.8'

services:
  # 1. Container Jupyter (PySpark)
  pyspark_container:
    image: jupyter/pyspark-notebook:latest
    ports:
      - "8888:8888"
    volumes:
      - ./notebooks:/home/jovyan/work
    environment:
      - JUPYTER_ENABLE_LAB=yes
    depends_on:
      - postgres
      - minio

  # 2. Container PostgreSQL (Database)
  postgres:
    image: postgres:15
    container_name: postgres_db
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=password123
      - POSTGRES_DB=retail_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # 3. Container MinIO (Data Lake / S3 Storage)
  minio:
    image: minio/minio
    container_name: minio_storage
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=password123
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

# Khai báo Volumes để lưu trữ dữ liệu vĩnh viễn
volumes:
  pgdata:
  minio_data: